<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quazar — O seu novo jogo favorito começa aqui</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ... (Mantive seu estilo original para o design não mudar) ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060e1a;
      --dark:    #091524;
      --mid:     #0d1b2e;
      --border:  #1a3a5c;
      --accent:  #4fc3e8;
      --accent2: #1e5fa3;
      --prime:   #e0f0ff;
      --muted:   #5a90b0;
      --dim:     #3a6a8a;
      --green:   #30c080;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--prime);
      font-family: 'Exo 2', sans-serif; overflow-x: hidden;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(6,14,26,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { width: 32px; height: 32px; border-radius: 4px; }
    .nav-logo-text {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 20px; letter-spacing: 3px; color: var(--prime);
    }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      font-size: 13px; color: var(--muted); text-decoration: none;
      transition: color 0.15s; font-weight: 500;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-download {
      padding: 7px 20px; border: none; border-radius: 6px;
      background: linear-gradient(90deg, #1e5fa3, #2a8acc);
      color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px; text-decoration: none; transition: all 0.15s;
    }
    .nav-download:hover { background: linear-gradient(90deg, #2a6cb0, #38bdf8); }
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 80px 40px 60px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(30,95,163,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(79,195,232,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(160,80,240,0.06) 0%, transparent 40%);
    }
    .hero-content { position: relative; z-index: 1; text-align: center; max-width: 800px; }
    .hero-logo { width: 100px; height: 100px; margin: 0 auto 28px; border-radius: 12px; }
    .hero-title {
      font-family: 'Rajdhani', sans-serif; font-size: 72px; font-weight: 700;
      color: var(--prime); letter-spacing: 6px; line-height: 1; margin-bottom: 16px;
    }
    .hero-slogan { font-size: 16px; color: var(--muted); margin-bottom: 40px; }
    .btn-hero-primary {
      padding: 14px 36px; border: none; border-radius: 8px;
      background: linear-gradient(90deg, #1e5fa3, #2a8acc);
      color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px; transition: all 0.2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .download-section { padding: 100px 40px; text-align: center; }
    .download-btn {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 16px 44px; border: none; border-radius: 10px;
      background: linear-gradient(90deg, #1e5fa3, #2a8acc);
      color: white; font-size: 18px; font-weight: 700;
      cursor: pointer; font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px; transition: all 0.2s; text-decoration: none;
    }
    footer { background: var(--dark); border-top: 1px solid var(--border); padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo img { width: 24px; height: 24px; border-radius: 4px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="Quazar_icon.jpg" alt="Quazar">
      <span class="nav-logo-text">QUAZAR</span>
    </div>
    <div class="nav-links">
      <a href="#download">Download</a>
    </div>
    <a href="#download" class="nav-download">↓ Baixar</a>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <img src="Quazar_icon.jpg" alt="Quazar" class="hero-logo">
      <div class="hero-title">QUAZAR</div>
      <div class="hero-slogan">O seu novo jogo favorito começa aqui</div>
      
      <a href="https://github.com/Quazar-app/quazar-backend/releases/download/v1.0.0/Quazar-Setup-1.0.0.exe" class="btn-hero-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Baixar para Windows
      </a>
    </div>
  </section>

  <section id="download" class="download-section">
    <h2 style="font-family: 'Rajdhani'; font-size: 32px; margin-bottom: 20px;">Pronto para jogar?</h2>
    <a href="https://github.com/Quazar-app/quazar-backend/releases/download/v1.0.0/quazar_setup.exe" class="download-btn">
      Baixar Quazar agora
    </a>
  </section>

  <footer>
    <div class="footer-logo">
      <img src="Quazar_icon.jpg" alt="Quazar">
      <span style="color: #5a90b0; font-family: 'Rajdhani'; margin-left: 10px;">QUAZAR © 2026</span>
    </div>
  </footer>

</body>
</html>
